<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Queen Coiffure</title>
    <script src='https://cdn.tailwindcss.com'></script>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Poppins', sans-serif; }
        .gradient-bg {
            background: linear-gradient(135deg, #ec4899 0%, #f472b6 100%);
        }
        .card-hover {
            transition: all 0.3s ease;
        }
        .card-hover:hover {
            transform: translateY(-4px);
            box-shadow: 0 12px 24px rgba(236, 72, 153, 0.15);
        }
        .btn-primary {
            background: linear-gradient(135deg, #ec4899 0%, #db2777 100%);
            transition: all 0.3s ease;
        }
        .btn-primary:hover {
            transform: translateY(-2px);
            box-shadow: 0 8px 16px rgba(236, 72, 153, 0.3);
        }
        .accent-yellow {
            color: #fbbf24;
        }
        .bg-accent-yellow {
            background-color: #fef3c7;
        }
    </style>
</head>
<body class='bg-gray-50 min-h-screen'>
    <!-- Header -->
    <header class='bg-white shadow-lg sticky top-0 z-50'>
        <div class='max-w-md mx-auto px-6 py-4 flex items-center justify-between'>
            <div class='flex items-center space-x-3'>
                <div class='w-10 h-10 gradient-bg rounded-full flex items-center justify-center'>
                    <span class='text-white text-xl'>💅</span>
                </div>
                <h1 class='font-bold text-xl text-gray-800'>Queen Coiffure</h1>
            </div>
            <div class='flex items-center space-x-2'>
                <span class='text-gray-500 text-sm'>Dashboard</span>
                <div class='w-2 h-2 bg-green-500 rounded-full animate-pulse'></div>
            </div>
        </div>
    </header>

    <!-- Main Content -->
    <main class='max-w-md mx-auto px-6 py-8'>
        <!-- Welcome Section -->
        <div class='mb-8'>
            <h2 class='text-2xl font-semibold text-gray-800 mb-2'>Welcome back! 👋</h2>
            <p class='text-gray-600'>Manage your beauty salon with ease</p>
        </div>

        <!-- Stats Cards -->
        <div class='grid grid-cols-2 gap-4 mb-8'>
            <div class='bg-white p-4 rounded-2xl shadow-sm card-hover'>
                <div class='flex items-center justify-between mb-2'>
                    <span class='text-3xl'>💰</span>
                    <span class='text-xs text-green-600 font-medium'>+12%</span>
                </div>
                <p class='text-2xl font-bold text-gray-800'>$2,450</p>
                <p class='text-sm text-gray-500'>Today's Revenue</p>
            </div>
            <div class='bg-white p-4 rounded-2xl shadow-sm card-hover'>
                <div class='flex items-center justify-between mb-2'>
                    <span class='text-3xl'>👥</span>
                    <span class='text-xs text-pink-600 font-medium'>Active</span>
                </div>
                <p class='text-2xl font-bold text-gray-800'>24</p>
                <p class='text-sm text-gray-500'>Clients Today</p>
            </div>
        </div>

        <!-- Quick Actions -->
        <div class='space-y-4'>
            <a href='services.html' class='block'>
                <button class='w-full btn-primary text-white py-4 rounded-2xl text-lg font-medium flex items-center justify-center space-x-2'>
                    <span>➕</span>
                    <span>Create New Invoice</span>
                </button>
            </a>
            
            <div class='grid grid-cols-2 gap-4'>
                <a href='history.html' class='block'>
                    <div class='bg-white p-4 rounded-2xl shadow-sm card-hover cursor-pointer'>
                        <div class='flex flex-col items-center space-y-2'>
                            <span class='text-3xl'>📄</span>
                            <span class='text-gray-700 font-medium'>History</span>
                            <span class='text-xs text-gray-500'>View transactions</span>
                        </div>
                    </div>
                </a>
                
                <a href='services.html' class='block'>
                    <div class='bg-white p-4 rounded-2xl shadow-sm card-hover cursor-pointer'>
                        <div class='flex flex-col items-center space-y-2'>
                            <span class='text-3xl'>⚙️</span>
                            <span class='text-gray-700 font-medium'>Services</span>
                            <span class='text-xs text-gray-500'>Manage offerings</span>
                        </div>
                    </div>
                </a>
            </div>
        </div>

        <!-- Recent Activity -->
        <div class='mt-8'>
            <h3 class='text-lg font-semibold text-gray-800 mb-4'>Recent Activity</h3>
            <div class='bg-white rounded-2xl shadow-sm p-4 space-y-3'>
                <div class='flex items-center justify-between'>
                    <div class='flex items-center space-x-3'>
                        <div class='w-8 h-8 bg-accent-yellow rounded-full flex items-center justify-center'>
                            <span class='text-sm'>💇</span>
                        </div>
                        <div>
                            <p class='text-sm font-medium text-gray-800'>Hair Styling</p>
                            <p class='text-xs text-gray-500'>2 mins ago</p>
                        </div>
                    </div>
                    <span class='accent-yellow font-semibold'>$10</span>
                </div>
                <div class='flex items-center justify-between'>
                    <div class='flex items-center space-x-3'>
                        <div class='w-8 h-8 bg-accent-yellow rounded-full flex items-center justify-center'>
                            <span class='text-sm'>💄</span>
                        </div>
                        <div>
                            <p class='text-sm font-medium text-gray-800'>Makeup</p>
                            <p class='text-xs text-gray-500'>15 mins ago</p>
                        </div>
                    </div>
                    <span class='accent-yellow font-semibold'>$20</span>
                </div>
            </div>
        </div>
    </main>
</body>
</html>
