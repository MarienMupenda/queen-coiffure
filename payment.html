<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Payment - Queen Coiffure</title>
    <script src='https://cdn.tailwindcss.com'></script>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Poppins', sans-serif; }
        .gradient-bg {
            background: linear-gradient(135deg, #ec4899 0%, #f472b6 100%);
        }
        .card-hover {
            transition: all 0.3s ease;
        }
        .card-hover:hover {
            transform: translateY(-2px);
            box-shadow: 0 8px 16px rgba(236, 72, 153, 0.1);
        }
        .btn-primary {
            background: linear-gradient(135deg, #ec4899 0%, #db2777 100%);
            transition: all 0.3s ease;
        }
        .btn-primary:hover {
            transform: translateY(-2px);
            box-shadow: 0 8px 16px rgba(236, 72, 153, 0.3);
        }
        .accent-yellow {
            color: #fbbf24;
        }
        .bg-accent-yellow {
            background-color: #fef3c7;
        }
        .payment-method {
            transition: all 0.3s ease;
            cursor: pointer;
            border: 2px solid transparent;
        }
        .payment-method:hover {
            border-color: #ec4899;
            background: linear-gradient(135deg, #fff 0%, #fdf2f8 100%);
        }
        .payment-method.selected {
            border-color: #ec4899;
            background: linear-gradient(135deg, #fdf2f8 0%, #fce7f3 100%);
        }
        .pulse-animation {
            animation: pulse 2s infinite;
        }
        @keyframes pulse {
            0% { transform: scale(1); }
            50% { transform: scale(1.05); }
            100% { transform: scale(1); }
        }
    </style>
</head>
<body class='bg-gray-50 min-h-screen'>
    <!-- Header -->
    <header class='bg-white shadow-lg sticky top-0 z-50'>
        <div class='max-w-md mx-auto px-6 py-4 flex items-center justify-between'>
            <div class='flex items-center space-x-3'>
                <a href='services.html' class='text-gray-600 hover:text-gray-800'>
                    <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 19l-7-7 7-7"></path>
                    </svg>
                </a>
                <h1 class='font-bold text-xl text-gray-800'>Payment</h1>
            </div>
            <div class='w-10 h-10 gradient-bg rounded-full flex items-center justify-center'>
                <span class='text-white'>💅</span>
            </div>
        </div>
    </header>

    <!-- Main Content -->
    <main class='max-w-md mx-auto px-6 py-8'>
        <!-- Progress Indicator -->
        <div class='flex items-center justify-between mb-8'>
            <div class='flex items-center space-x-2'>
                <div class='w-8 h-8 bg-green-500 rounded-full flex items-center justify-center'>
                    <svg class="w-4 h-4 text-white" fill="currentColor" viewBox="0 0 20 20">
                        <path fill-rule="evenodd" d="M16.707 5.293a1 1 0 010 1.414l-8 8a1 1 0 01-1.414 0l-4-4a1 1 0 011.414-1.414L8 12.586l7.293-7.293a1 1 0 011.414 0z" clip-rule="evenodd"></path>
                    </svg>
                </div>
                <div class='w-16 h-1 bg-green-500 rounded'></div>
            </div>
            <div class='flex items-center space-x-2'>
                <div class='w-8 h-8 bg-green-500 rounded-full flex items-center justify-center'>
                    <svg class="w-4 h-4 text-white" fill="currentColor" viewBox="0 0 20 20">
                        <path fill-rule="evenodd" d="M16.707 5.293a1 1 0 010 1.414l-8 8a1 1 0 01-1.414 0l-4-4a1 1 0 011.414-1.414L8 12.586l7.293-7.293a1 1 0 011.414 0z" clip-rule="evenodd"></path>
                    </svg>
                </div>
                <div class='w-16 h-1 bg-green-500 rounded'></div>
            </div>
            <div class='flex items-center space-x-2'>
                <div class='w-8 h-8 gradient-bg rounded-full flex items-center justify-center pulse-animation'>
                    <span class='text-white text-sm font-bold'>3</span>
                </div>
            </div>
        </div>

        <!-- Order Summary -->
        <div class='bg-white rounded-2xl shadow-sm p-6 mb-6'>
            <h2 class='text-lg font-semibold text-gray-800 mb-4'>Order Summary</h2>
            <div class='space-y-3 mb-4'>
                <div class='flex items-center justify-between'>
                    <div class='flex items-center space-x-2'>
                        <span class='text-lg'>💇</span>
                        <span class='text-gray-700'>Hair Styling</span>
                    </div>
                    <span class='font-medium text-gray-800'>$10</span>
                </div>
                <div class='flex items-center justify-between'>
                    <div class='flex items-center space-x-2'>
                        <span class='text-lg'>💄</span>
                        <span class='text-gray-700'>Makeup</span>
                    </div>
                    <span class='font-medium text-gray-800'>$20</span>
                </div>
            </div>
            <div class='border-t pt-4'>
                <div class='flex items-center justify-between mb-2'>
                    <span class='text-gray-600'>Subtotal</span>
                    <span class='font-medium text-gray-800'>$30</span>
                </div>
                <div class='flex items-center justify-between mb-2'>
                    <span class='text-gray-600'>Service Fee</span>
                    <span class='font-medium text-gray-800'>$2</span>
                </div>
                <div class='flex items-center justify-between pt-2 border-t'>
                    <span class='text-lg font-semibold text-gray-800'>Total</span>
                    <span class='text-2xl font-bold accent-yellow'>$32</span>
                </div>
            </div>
        </div>

        <!-- Payment Methods -->
        <div class='bg-white rounded-2xl shadow-sm p-6 mb-6'>
            <h2 class='text-lg font-semibold text-gray-800 mb-4'>Select Payment Method</h2>
            <div class='space-y-3'>
                <div class='payment-method bg-gray-50 p-4 rounded-xl flex items-center justify-between' data-method='m-pesa'>
                    <div class='flex items-center space-x-3'>
                        <div class='w-12 h-12 bg-green-500 rounded-lg flex items-center justify-center'>
                            <span class='text-white font-bold text-sm'>M</span>
                        </div>
                        <div>
                            <p class='font-medium text-gray-800'>M-Pesa</p>
                            <p class='text-xs text-gray-500'>Pay with M-Pesa</p>
                        </div>
                    </div>
                    <div class='w-6 h-6 border-2 border-gray-300 rounded-lg flex items-center justify-center'>
                        <svg class="w-4 h-4 text-pink-600 hidden" fill="currentColor" viewBox="0 0 20 20">
                            <path fill-rule="evenodd" d="M16.707 5.293a1 1 0 010 1.414l-8 8a1 1 0 01-1.414 0l-4-4a1 1 0 011.414-1.414L8 12.586l7.293-7.293a1 1 0 011.414 0z" clip-rule="evenodd"></path>
                        </svg>
                    </div>
                </div>

                <div class='payment-method bg-gray-50 p-4 rounded-xl flex items-center justify-between' data-method='airtel-money'>
                    <div class='flex items-center space-x-3'>
                        <div class='w-12 h-12 bg-red-500 rounded-lg flex items-center justify-center'>
                            <span class='text-white font-bold text-sm'>A</span>
                        </div>
                        <div>
                            <p class='font-medium text-gray-800'>Airtel Money</p>
                            <p class='text-xs text-gray-500'>Pay with Airtel Money</p>
                        </div>
                    </div>
                    <div class='w-6 h-6 border-2 border-gray-300 rounded-lg flex items-center justify-center'>
                        <svg class="w-4 h-4 text-pink-600 hidden" fill="currentColor" viewBox="0 0 20 20">
                            <path fill-rule="evenodd" d="M16.707 5.293a1 1 0 010 1.414l-8 8a1 1 0 01-1.414 0l-4-4a1 1 0 011.414-1.414L8 12.586l7.293-7.293a1 1 0 011.414 0z" clip-rule="evenodd"></path>
                        </svg>
                    </div>
                </div>

                <div class='payment-method bg-gray-50 p-4 rounded-xl flex items-center justify-between' data-method='orange-money'>
                    <div class='flex items-center space-x-3'>
                        <div class='w-12 h-12 bg-orange-500 rounded-lg flex items-center justify-center'>
                            <span class='text-white font-bold text-sm'>O</span>
                        </div>
                        <div>
                            <p class='font-medium text-gray-800'>Orange Money</p>
                            <p class='text-xs text-gray-500'>Pay with Orange Money</p>
                        </div>
                    </div>
                    <div class='w-6 h-6 border-2 border-gray-300 rounded-lg flex items-center justify-center'>
                        <svg class="w-4 h-4 text-pink-600 hidden" fill="currentColor" viewBox="0 0 20 20">
                            <path fill-rule="evenodd" d="M16.707 5.293a1 1 0 010 1.414l-8 8a1 1 0 01-1.414 0l-4-4a1 1 0 011.414-1.414L8 12.586l7.293-7.293a1 1 0 011.414 0z" clip-rule="evenodd"></path>
                        </svg>
                    </div>
                </div>

                <div class='payment-method bg-gray-50 p-4 rounded-xl flex items-center justify-between' data-method='cash'>
                    <div class='flex items-center space-x-3'>
                        <div class='w-12 h-12 bg-gray-700 rounded-lg flex items-center justify-center'>
                            <span class='text-white font-bold text-sm'>$</span>
                        </div>
                        <div>
                            <p class='font-medium text-gray-800'>Cash</p>
                            <p class='text-xs text-gray-500'>Pay with cash</p>
                        </div>
                    </div>
                    <div class='w-6 h-6 border-2 border-gray-300 rounded-lg flex items-center justify-center'>
                        <svg class="w-4 h-4 text-pink-600 hidden" fill="currentColor" viewBox="0 0 20 20">
                            <path fill-rule="evenodd" d="M16.707 5.293a1 1 0 010 1.414l-8 8a1 1 0 01-1.414 0l-4-4a1 1 0 011.414-1.414L8 12.586l7.293-7.293a1 1 0 011.414 0z" clip-rule="evenodd"></path>
                        </svg>
                    </div>
                </div>
            </div>
        </div>

        <!-- Pay Button -->
        <button id='pay-btn' class='w-full btn-primary text-white py-4 rounded-2xl text-lg font-medium opacity-50 cursor-not-allowed transition-all duration-300'>
            <span class='flex items-center justify-center space-x-2'>
                <span>Select Payment Method</span>
                <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M13 7l5 5m0 0l-5 5m5-5H6"></path>
                </svg>
            </span>
        </button>

        <!-- Security Notice -->
        <div class='mt-6 text-center'>
            <div class='flex items-center justify-center space-x-2 text-gray-500 text-sm'>
                <svg class="w-4 h-4" fill="currentColor" viewBox="0 0 20 20">
                    <path fill-rule="evenodd" d="M5 9V7a5 5 0 0110 0v2a2 2 0 012 2v5a2 2 0 01-2 2H5a2 2 0 01-2-2v-5a2 2 0 012-2zm8-2v2H7V7a3 3 0 016 0z" clip-rule="evenodd"></path>
                </svg>
                <span>Secure payment powered by Queen Coiffure</span>
            </div>
        </div>
    </main>

    <script>
        let selectedMethod = null;

        document.querySelectorAll('.payment-method').forEach(method => {
            method.addEventListener('click', function() {
                // Remove previous selection
                document.querySelectorAll('.payment-method').forEach(m => {
                    m.classList.remove('selected');
                    m.querySelector('svg').classList.add('hidden');
                });
                
                // Add selection to clicked method
                this.classList.add('selected');
                this.querySelector('svg').classList.remove('hidden');
                
                selectedMethod = this.dataset.method;
                updatePayButton();
            });
        });

        function updatePayButton() {
            const payBtn = document.getElementById('pay-btn');
            if (selectedMethod) {
                payBtn.classList.remove('opacity-50', 'cursor-not-allowed');
                payBtn.innerHTML = `
                    <span class='flex items-center justify-center space-x-2'>
                        <span>Pay $32 with ${selectedMethod.replace('-', ' ').replace(/\b\w/g, l => l.toUpperCase())}</span>
                        <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M13 7l5 5m0 0l-5 5m5-5H6"></path>
                        </svg>
                    </span>
                `;
                payBtn.onclick = function() {
                    // Process payment
                    alert('Payment processing... This would integrate with actual payment gateway');
                };
            } else {
                payBtn.classList.add('opacity-50', 'cursor-not-allowed');
                payBtn.innerHTML = `
                    <span class='flex items-center justify-center space-x-2'>
                        <span>Select Payment Method</span>
                        <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M13 7l5 5m0 0l-5 5m5-5H6"></path>
                        </svg>
                    </span>
                `;
                payBtn.onclick = null;
            }
        }
    </script>
</body>
</html>
